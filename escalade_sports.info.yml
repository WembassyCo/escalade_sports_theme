name: 'Escalade Sports'
type: theme
description: 'Custom Bootstrap 5 theme for Escalade Sports - D7 theme recreation for D11.'
package: Custom
core_version_requirement: ^10 || ^11

# Base theme - Radix provides Bootstrap 5
base theme: radix

regions:
  # Header regions (from D7)
  header: 'Header'
  menu_bar: 'Menu Bar'
  under_header: 'Under Header (Banner)'
  
  # Content regions
  content: 'Content'
  sidebar_first: 'Sidebar First'
  sidebar_second: 'Sidebar Second'
  
  # Homepage specific regions (5-region layout from D7)
  home_top_left: 'Home Top Left'
  home_top_mid: 'Home Top Center'
  home_top_right: 'Home Top Right'
  home_bottom_left: 'Home Bottom Left'
  home_bottom_right: 'Home Bottom Right'
  
  # Footer regions (from D7)
  above_footer: 'Above Footer'
  footer: 'Footer'
  footer_left: 'Footer Left'
  footer_right: 'Footer Right'

libraries:
  - escalade_sports/bootstrap
  - escalade_sports/theme

# For theme preview
theme_suggestions:
  - escalade_sports

css_preprocessor: true
js_preprocessor: true

# Theme dependencies
dependencies:
  - drupal:system
  - drupal:user
